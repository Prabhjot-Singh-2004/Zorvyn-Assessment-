version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: zorvyn-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: zorvyn-app
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/zorvyn-finance
      - JWT_SECRET=zorvyn-dev-secret
      - NODE_ENV=production
    depends_on:
      - mongo

volumes:
  mongo-data:
